name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ozledger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload app files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: ".github,.gitignore,App.tsx,README.md,components,constants.tsx,deploy,ecosystem.config.cjs,index.html,index.tsx,metadata.json,package-lock.json,package.json,scripts,server,services,tsconfig.json,tsconfig.node.json,types.ts,vite.config.ts,.env.example"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true
          rm: false

      - name: Run remote deploy
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: DEPLOY_PATH
          script_stop: true
          command_timeout: 30m
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:${PATH}"
            DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
            export DEPLOY_PATH
            cd "$DEPLOY_PATH"
            bash scripts/deploy-remote.sh
